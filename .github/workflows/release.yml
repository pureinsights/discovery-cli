name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: windows-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      -
        name: Set up Go
        uses: actions/setup-go@v5
      -
        name: Set the version environment variable
        run: |
          $VERSION = Get-Content semver.properties |
              Where-Object { $_ -match '^version\.semver=' } |
              ForEach-Object { ($_ -split '=')[1].Trim() }

          Write-Host "Building version $VERSION"

          "GORELEASER_CURRENT_TAG=$VERSION" >> $env:GITHUB_ENV
      -
        name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}