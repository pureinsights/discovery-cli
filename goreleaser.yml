version: 2

builds:
  - id: discovery-cli
    main: ./cmd/discovery
    binary: discovery
    ldflags:
      - -s -w -X github.com/pureinsights/discovery-cli/cmd/version.Version={{.Version}}

archives:
  - id: default
    ids:
      - discovery-cli
    formats: tar.gz

    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

    files:
    - src: ./README.md
      dst: README.md
